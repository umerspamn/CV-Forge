# ─────────────────────────────────────────────
#  CVForge — Docker Compose
#  Runs 3 containers:
#    postgres  — database
#    api       — Node.js Express server
#    nginx     — web server + reverse proxy
#
#  Start:   docker compose up -d
#  Stop:    docker compose down
#  Logs:    docker compose logs -f
#  Restart: docker compose restart api
# ─────────────────────────────────────────────

services:

  # ── 1. PostgreSQL Database ──────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cvforge-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB:       cvforge
      POSTGRES_USER:     cvforge_app
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      # Persist database data even when container is removed
      - postgres_data:/var/lib/postgresql/data
      # Run schema on first startup automatically
      - ./sql/auth_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

    # Only accessible to other containers — not exposed to internet
    expose:
      - "5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvforge_app -d cvforge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - cvforge-net

  # ── 2. Node.js API ──────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: cvforge-api
    restart: unless-stopped

    # Load environment variables from .env file
    env_file: .env

    environment:
      NODE_ENV:  production
      DB_HOST:   postgres        # container name = hostname
      DB_PORT:   5432
      DB_NAME:   cvforge
      DB_USER:   cvforge_app
      DB_SSL:    false

    # Only start after postgres is healthy
    depends_on:
      postgres:
        condition: service_healthy

    # Only accessible to other containers — nginx proxies to it
    expose:
      - "3000"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    networks:
      - cvforge-net

  # ── 3. nginx Web Server ─────────────────────
  nginx:
    image: nginx:alpine
    container_name: cvforge-nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      # nginx config file
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Frontend HTML files
      - ./frontend:/usr/share/nginx/html:ro
      # SSL certificates from Let's Encrypt (on host machine)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # nginx logs
      - nginx_logs:/var/log/nginx

    depends_on:
      api:
        condition: service_healthy

    networks:
      - cvforge-net

# ── Named Volumes ───────────────────────────────
# Docker manages these — data persists across restarts
volumes:
  postgres_data:
    name: cvforge_postgres_data
  nginx_logs:
    name: cvforge_nginx_logs

# ── Network ─────────────────────────────────────
# All containers talk to each other on this private network
# Nothing is exposed to the internet except nginx ports 80/443
networks:
  cvforge-net:
    name: cvforge-network
    driver: bridge


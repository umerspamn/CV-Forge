name: Deploy CVForge to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          SSH_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          SSH_HOST: ${{ secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              "$SSH_USER@$SSH_HOST" \
              'cd /home/ubuntu/cvforge-docker && git pull origin main && docker compose up -d --build && sleep 20 && docker compose ps && echo DEPLOY_DONE'

      - name: Verify site is live
        run: |
          sleep 15
          status=$(curl -s -o /dev/null -w "%{http_code}" https://cvforge.duckdns.org)
          echo "Site returned HTTP $status"
          if [ "$status" = "200" ] || [ "$status" = "301" ] || [ "$status" = "302" ]; then
            echo "✅ Site is live and responding"
          else
            echo "⚠️ Unexpected status $status"
          fi

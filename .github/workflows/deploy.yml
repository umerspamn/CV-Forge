name: Deploy CVForge to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug secrets
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
          KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "HOST length: ${#HOST}"
          echo "USER length: ${#USER}"
          echo "KEY length: ${#KEY}"
          echo "HOST value: $HOST"
          echo "USER value: $USER"

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          SSH_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat ~/.ssh/deploy_key | head -1
          cat ~/.ssh/deploy_key | tail -1
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts || echo "keyscan failed for: $SSH_HOST"

      - name: Deploy to EC2
        env:
          SSH_HOST: ${{ secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              "$SSH_USER@$SSH_HOST" \
              'echo CONNECTED && cd /home/ubuntu/cvforge-docker && git pull origin main && docker compose up -d --build && docker compose ps'
